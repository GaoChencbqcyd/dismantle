<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆解 — 焦虑拆解器原型</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<!-- Phone Frame -->
<div class="phone-frame" id="phoneFrame">
  <!-- Status Bar -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <span class="status-icons">
      <svg width="17" height="11" viewBox="0 0 17 11"><rect x="0" y="0" width="15" height="11" rx="2" fill="none" stroke="currentColor" stroke-width="1"/><rect x="2" y="2" width="11" height="7" rx="1" fill="currentColor"/></svg>
      <svg width="15" height="11" viewBox="0 0 15 11"><path d="M1 3.5A2.5 2.5 0 013.5 1h8A2.5 2.5 0 0114 3.5v4A2.5 2.5 0 0111.5 10h-8A2.5 2.5 0 011 7.5v-4z" fill="none" stroke="currentColor" stroke-width="1"/><rect x="2.5" y="3" width="1" height="5" rx="0.5" fill="currentColor"/></svg>
    </span>
  </div>
  
  <!-- App Header -->
  <div class="app-header" id="appHeader">
    <button class="header-back" id="headerBack" onclick="goBack()">
      <svg width="20" height="20" viewBox="0 0 20 20"><path d="M12 4l-6 6 6 6" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <span class="header-title" id="headerTitle">拆解</span>
    <button class="header-action" id="themeToggle" onclick="toggleTheme()" aria-label="切换主题">
      <svg class="icon-sun" width="20" height="20" viewBox="0 0 20 20"><circle cx="10" cy="10" r="4" fill="none" stroke="currentColor" stroke-width="1.5"/><path d="M10 2v2M10 16v2M18 10h-2M4 10H2M15.66 4.34l-1.42 1.42M5.76 14.24l-1.42 1.42M15.66 15.66l-1.42-1.42M5.76 5.76L4.34 4.34" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
      <svg class="icon-moon" width="20" height="20" viewBox="0 0 20 20"><path d="M16.5 12.5A6.5 6.5 0 017.5 3.5 6.5 6.5 0 1016.5 12.5z" fill="currentColor"/></svg>
    </button>
  </div>

  <!-- Page Container -->
  <div class="page-container" id="pageContainer">
    <!-- Pages injected by JS -->
  </div>

  <!-- Bottom Tab Bar -->
  <div class="tab-bar" id="tabBar">
    <button class="tab-item active" data-tab="home" onclick="switchTab('home')">
      <svg width="22" height="22" viewBox="0 0 22 22"><path d="M3 9l8-6 8 6v10a1 1 0 01-1 1H4a1 1 0 01-1-1V9z" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      <span>首页</span>
    </button>
    <button class="tab-item" data-tab="compass" onclick="switchTab('compass')">
      <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="11" r="9" fill="none" stroke="currentColor" stroke-width="1.8"/><polygon points="11,4 13,9 11,11 9,9" fill="currentColor" opacity="0.3"/><line x1="11" y1="11" x2="16" y2="16" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>罗盘</span>
    </button>
    <button class="tab-item" data-tab="insight" onclick="switchTab('insight')">
      <svg width="22" height="22" viewBox="0 0 22 22"><rect x="3" y="13" width="4" height="6" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="9" y="8" width="4" height="11" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/><rect x="15" y="4" width="4" height="15" rx="1" fill="none" stroke="currentColor" stroke-width="1.8"/></svg>
      <span>洞察</span>
    </button>
    <button class="tab-item" data-tab="profile" onclick="switchTab('profile')">
      <svg width="22" height="22" viewBox="0 0 22 22"><circle cx="11" cy="8" r="4" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M4 20c0-4 3.1-7 7-7s7 3 7 7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>我的</span>
    </button>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>
  
  <!-- Modal overlay -->
  <div class="modal-overlay" id="modalOverlay" onclick="closeModal()"></div>
  <div class="modal-sheet" id="modalSheet"></div>
</div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
