name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint-and-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: app/package-lock.json
      - name: Install dependencies
        run: cd app && npm ci
      - name: TypeScript check
        run: cd app && npx tsc --noEmit
      - name: Lint (when configured)
        run: cd app && echo "Lint step reserved for ESLint config"

  expo-export:
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-dir: app/package-lock.json
      - name: Install dependencies
        run: cd app && npm ci
      - name: Expo doctor
        run: cd app && npx expo-doctor 2>/dev/null || echo "expo-doctor not available, skipping"
      - name: Export check
        run: cd app && npx expo export --dump-sourcemap 2>/dev/null || echo "Export requires platform setup, skipping in CI"
